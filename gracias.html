<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Gracias por registrarte! - Hidrosir</title>
    
    <!-- Redirección automática en 10 segundos mediante Meta Tag -->
    <meta http-equiv="refresh" content="10;url=index.html">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandRed: '#ad3335',
                        brandBlue: '#4c6881',
                        brandCeleste: '#578c92',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="logo-solo.ico">
</head>
<body class="bg-slate-50 text-slate-700 antialiased flex flex-col min-h-screen justify-between font-sans">

    <!-- Espaciador superior -->
    <div></div>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="max-w-md mx-auto w-full px-4 text-center">
        <div class="bg-white border border-slate-200 p-8 md:p-10 rounded-3xl shadow-xl flex flex-col items-center">
            
            <!-- Icono de Éxito -->
            <div class="w-16 h-16 bg-brandCeleste/10 text-brandCeleste rounded-full flex items-center justify-center text-3xl mb-6 animate-bounce">
                ✓
            </div>

            <!-- Mensaje -->
            <h1 class="text-2xl md:text-3xl font-extrabold text-slate-900 mb-4">
                ¡Formulario Enviado!
            </h1>
            <p class="text-slate-600 font-light text-sm md:text-base mb-6 leading-relaxed">
                Tu correo se ha enviado correctamente. Nos pondremos en contacto con vos a la brevedad para coordinar la sesión estratégica.
            </p>

            <!-- Separador -->
            <div class="w-16 h-0.5 bg-slate-100 mb-6"></div>

            <!-- Contador de Redirección -->
            <p class="text-xs text-slate-400 font-light mb-6">
                Serás redirigido al inicio automáticamente en <span id="countdown" class="font-bold text-brandRed text-sm">10</span> segundos.
            </p>

            <!-- Botón de retorno manual por si no quieren esperar -->
            <a href="index.html" class="inline-flex items-center justify-center px-6 py-3 w-full font-bold text-sm text-white bg-brandBlue rounded-xl shadow-md hover:bg-brandBlue/90 transition-all duration-300 transform hover:-translate-y-0.5">
                Volver ahora
            </a>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="py-6 text-center text-xs text-slate-400">
        <p>&copy; 2026 Hidrosir. Tratamiento integral del agua.</p>
    </footer>

    <!-- Script para el contador visual -->
    <script>
        let seconds = 10;
        const countdownElement = document.getElementById('countdown');

        const interval = setInterval(() => {
            seconds--;
            countdownElement.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(interval);
            }
        }, 1000);
    </script>

</body>
</html>
